<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseX — Transactions</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="/dashboard.html" class="sidebar-logo-text">ExpenseX</a>
      <button class="sidebar-toggle" id="sidebar-toggle">‹</button>
    </div>
    <ul class="nav-list">
      <li><a href="/dashboard.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-label">Dashboard</span>
      </a></li>
      <li><a href="/transactions.html" class="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>
        <span class="nav-label">Transactions</span>
      </a></li>
      <li><a href="/bills.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span class="nav-label">Bills</span>
      </a></li>
      <li><a href="/budgets.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Budgets</span>
      </a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span id="sidebar-username"></span>
      </div>
      <button class="btn-theme-toggle" id="btn-theme-toggle" aria-label="Toggle color theme">
        <svg class="icon-moon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span class="theme-label">Dark Mode</span>
      </button>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Transactions</h1>
      <button class="btn btn-primary" onclick="openModal('modal-add-tx')">+ Add</button>
    </div>

    <div id="alert-tx" class="alert alert-error"></div>

    <div class="panel standalone">
      <table class="data-table">
        <thead><tr>
          <th>Date</th>
          <th>Type</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Notes</th>
          <th></th>
        </tr></thead>
        <tbody id="tx-tbody">
          <tr><td colspan="6" class="text-center"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Add Transaction Modal -->
<div class="modal-backdrop" id="modal-add-tx">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Transaction</span>
      <button class="modal-close" onclick="closeModal('modal-add-tx')">×</button>
    </div>
    <div id="alert-modal" class="alert alert-error"></div>
    <form id="form-add-tx" onsubmit="handleAddTx(event)">
      <div class="type-toggle">
        <button type="button" class="type-toggle-btn type-expense active" data-type="expense" onclick="setTxType('expense')">Expense</button>
        <button type="button" class="type-toggle-btn type-income"          data-type="income"  onclick="setTxType('income')">Income</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="tx-date">Date</label>
          <input class="form-control" id="tx-date" type="date" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="tx-category">Category</label>
          <select class="form-control" id="tx-category" required>
            <option value="">Select…</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="tx-amount">Amount ($)</label>
        <input class="form-control" id="tx-amount" type="number" step="0.01" min="0.01" placeholder="0.00" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="tx-notes">Notes (optional)</label>
        <input class="form-control" id="tx-notes" type="text" placeholder="What was this for?" />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" onclick="closeModal('modal-add-tx')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="btn-tx-submit">Add Expense</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Transaction Modal -->
<div class="modal-backdrop" id="modal-edit-tx">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit Transaction</span>
      <button class="modal-close" onclick="closeModal('modal-edit-tx')">×</button>
    </div>
    <div id="alert-edit-tx" class="alert alert-error"></div>
    <form id="form-edit-tx" onsubmit="handleEditTx(event)">
      <input type="hidden" id="edit-tx-id" />
      <div class="type-toggle">
        <button type="button" class="type-toggle-btn type-expense" data-type="expense" onclick="setEditTxType('expense')">Expense</button>
        <button type="button" class="type-toggle-btn type-income"  data-type="income"  onclick="setEditTxType('income')">Income</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="edit-tx-date">Date</label>
          <input class="form-control" id="edit-tx-date" type="date" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-tx-category">Category</label>
          <select class="form-control" id="edit-tx-category" required>
            <option value="">Select…</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-tx-amount">Amount ($)</label>
        <input class="form-control" id="edit-tx-amount" type="number" step="0.01" min="0.01" placeholder="0.00" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-tx-notes">Notes (optional)</label>
        <input class="form-control" id="edit-tx-notes" type="text" placeholder="What was this for?" />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" onclick="closeModal('modal-edit-tx')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/transactions.js"></script>
</body>
</html>
