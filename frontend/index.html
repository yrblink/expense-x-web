<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseX — Sign In</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<button class="btn-theme-toggle-auth" id="btn-theme-toggle" aria-label="Toggle color theme">
  <svg class="icon-moon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <span class="theme-label">Dark Mode</span>
</button>

<div class="auth-page">

  <!-- Left brand panel -->
  <div class="auth-brand">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.12em;color:rgba(255,255,255,0.25);text-transform:uppercase;">ExpenseX</div>

    <div class="auth-brand-word">Control<br>your<br>money.</div>

    <div class="auth-brand-bottom">
      <p class="auth-brand-tagline">Track spending, manage bills, and set budgets, all in one place.</p>
      <div class="auth-features">
        <div class="auth-feature">Expense Tracking</div>
        <div class="auth-feature">Bill Management</div>
        <div class="auth-feature">Monthly Budgets</div>
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="auth-form-panel">
    <div class="auth-logo">ExpenseX</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Create Account</button>
      </div>

      <div id="alert" class="alert alert-error"></div>

      <!-- Login Form -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-user">Username</label>
          <input class="form-control" id="login-user" type="text" placeholder="Enter username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Password</label>
          <input class="form-control" id="login-pass" type="password" placeholder="Enter password" required autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px;" type="submit" id="btn-login">
          Sign In
        </button>
        <p class="text-sub text-center mt-16" style="font-size:13px;">
          No account? <a href="#" onclick="switchTab('register')">Create one</a>
        </p>
      </form>

      <!-- Register Form -->
      <form id="form-register" style="display:none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="reg-user">Username</label>
          <input class="form-control" id="reg-user" type="text" placeholder="Choose a username" required autocomplete="username" minlength="3" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass">Password</label>
          <input class="form-control" id="reg-pass" type="password" placeholder="8+ characters" required autocomplete="new-password" minlength="8" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass2">Confirm Password</label>
          <input class="form-control" id="reg-pass2" type="password" placeholder="Retype password" required autocomplete="new-password" />
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px;" type="submit" id="btn-register">
          Create Account
        </button>
        <p class="text-sub text-center mt-16" style="font-size:13px;">
          Have an account? <a href="#" onclick="switchTab('login')">Sign in</a>
        </p>
      </form>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
